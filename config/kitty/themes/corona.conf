# The basic colors
foreground              #e0e0e0  # Light gray text (L's high-contrast preference)
background              #121212  # Near-black background (Death Note's darkness)
selection_foreground    #121212
selection_background    #bdbdbd  # Medium gray selection

# Cursor colors
cursor                  #ffffff  # Pure white cursor
cursor_text_color       #121212

# URL underline color
url_color               #616161  # Subtle gray underline

# Window border colors
active_border_color     #ffffff  # White for focused window
inactive_border_color   #424242  # Dark gray for inactive
bell_border_color       #ffca28  # Yellow accent (Shinigami eyes)

# Tab bar colors
active_tab_foreground   #121212
active_tab_background   #ffffff  # White active tab
inactive_tab_foreground #bdbdbd
inactive_tab_background #212121
tab_bar_background      #121212

# The 16 terminal colors

# black (grays)
color0  #212121  # Dark gray
color8  #616161  # Medium gray

# red (blood accent)
color1  #d32f2f  # Darker red
color9  #ef5350  # Bright red

# green (muted)
color2  #2e7d32  # Dark green
color10 #66bb6a  # Medium green

# yellow (Shinigami accent)
color3  #ffb300  # Golden yellow
color11 #ffca28  # Light yellow

# blue (muted)
color4  #0d47a1  # Dark blue
color12 #42a5f5  # Medium blue

# magenta (Death Note purple)
color5  #6a1b9a  # Dark purple
color13 #ab47bc  # Medium purple

# cyan (muted)
color6  #006064  # Dark cyan
color14 #26c6da  # Medium cyan

# white (text colors)
color7  #e0e0e0  # Light gray
color15 #ffffff  # Pure white
